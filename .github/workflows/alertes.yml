name: 🍷 Alertes Vin

on:
  schedule:
    - cron: '45 6 * * *'    # Gmail 8h45 Paris
    - cron: '45 7 * * *'    # Gmail 9h45 Paris
    - cron: '45 9 * * *'    # Gmail 11h45 Paris
    - cron: '45 15 * * *'   # Gmail 17h45 Paris
    - cron: '45 16 * * *'   # Gmail 18h45 Paris
    - cron: '0 7 * * *'     # Sites ventes privées 9h00 Paris
    - cron: '0 8 * * *'     # Sites ventes privées 10h00 Paris
    - cron: '0 10 * * *'    # Sites ventes privées 12h00 Paris
    - cron: '0 16 * * *'    # Sites ventes privées 18h00 Paris
    - cron: '0 17 * * *'    # Sites ventes privées 19h00 Paris
    - cron: '0 7 * * *'     # Cavistes prioritaires 9h00 Paris
    - cron: '0 17 * * *'    # Cavistes prioritaires 19h00 Paris
  workflow_dispatch:

jobs:
  scanner-gmail:
    name: 📬 Scan emails Gmail
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer les scripts
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4 feedparser

      - name: 📬 Scanner les emails Gmail
        run: python script_scan_gmail.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_SCAN_PASSWORD: ${{ secrets.GMAIL_SCAN_PASSWORD }}

  scanner-sites:
    name: 🔍 Scan sites ventes privées
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer les scripts
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4 feedparser

      - name: 🔍 Scanner les ventes privées
        run: python script_ventes_privees.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

      - name: 📝 Scanner les flux RSS
        run: python script_instagram_rss.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

  scanner-cavistes:
    name: 🏪 Scan cavistes prioritaires
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer les scripts
        uses: actions/checkout@v4

      - name: 🐍 Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: 🏪 Scanner les cavistes prioritaires
        run: python script_cavistes_prioritaires.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
