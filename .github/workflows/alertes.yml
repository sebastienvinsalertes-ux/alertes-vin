name: 🍷 Alertes Vin

on:
  schedule:
    - cron: '45 6 * * *'    # 8h45 Paris
    - cron: '45 9 * * *'    # 11h45 Paris
    - cron: '45 15 * * *'   # 17h45 Paris
    - cron: '0 7 * * *'     # 9h00 Paris
    - cron: '0 10 * * *'    # 12h00 Paris
    - cron: '0 16 * * *'    # 18h00 Paris
    - cron: '0 19 * * *'    # 21h00 Paris
  workflow_dispatch:

jobs:
  scanner-gmail:
    name: 📬 Scan emails Gmail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 feedparser
      - run: python script_scan_gmail.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_SCAN_PASSWORD: ${{ secrets.GMAIL_SCAN_PASSWORD }}

  scanner-sites:
    name: 🔍 Scan ventes privées
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 feedparser
      - run: python script_ventes_privees.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      - run: python script_instagram_rss.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

  scanner-cavistes:
    name: 🏪 Scan cavistes prioritaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python script_cavistes_prioritaires.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

  scanner-france:
    name: 🌍 Scan cavistes France
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python script_cavistes_france.py
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
