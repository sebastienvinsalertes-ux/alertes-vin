name: Trigger Keep-Alive
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sebastienvinsalertes-ux/alertes-vin/actions/workflows/alertes.yml/dispatches \
            -d '{"ref":"main"}'
